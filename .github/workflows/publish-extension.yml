name: Publish VS Code Extension

on:
  push:
    tags:
      - "ext-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package only; do not publish to the marketplace"
        type: boolean
        default: false

# Serialize publishes for the same ref; do NOT cancel in progress — a
# half-cancelled marketplace publish / release is worse than waiting.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  # Block the publish until ci.yml has succeeded on the same commit.
  # Tag pushes do not trigger ci.yml (it only listens to main pushes and
  # PRs), so we wait for the ci.yml run that fired on the merge commit
  # this tag points at. workflow_dispatch (manual smoke tests) skips
  # the gate so dry-runs don't depend on a fresh CI run.
  wait-for-ci:
    name: Wait for ci.yml on this commit
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wait for ci.yml to succeed
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const head_sha = context.sha;
            const TIMEOUT_MS = 30 * 60 * 1000;
            const POLL_MS = 15 * 1000;
            const start = Date.now();
            core.info(`Waiting for ci.yml to complete successfully on ${head_sha}`);
            while (Date.now() - start < TIMEOUT_MS) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'ci.yml',
                head_sha,
                per_page: 5,
              });
              const run = data.workflow_runs[0];
              if (!run) {
                core.info(`No ci.yml run for ${head_sha} yet; polling`);
              } else if (run.status === 'completed') {
                if (run.conclusion === 'success') {
                  core.info(`ci.yml passed (run ${run.id})`);
                  return;
                }
                core.setFailed(
                  `ci.yml for ${head_sha} concluded ${run.conclusion} (run ${run.id}); ` +
                  `refusing to publish`,
                );
                return;
              } else {
                core.info(`ci.yml run ${run.id} status: ${run.status}; polling`);
              }
              await new Promise(r => setTimeout(r, POLL_MS));
            }
            core.setFailed(
              `Timed out after ${TIMEOUT_MS / 1000}s waiting for ci.yml on ${head_sha}`,
            );

  package:
    name: Package VSIX (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: wait-for-ci
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64
            runner: ubuntu-latest
          - target: win32-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/ext-v') && matrix.target == 'linux-x64'
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#ext-v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi

      - run: npm run build

      - name: Prune dev dependencies before packaging
        run: npm prune --omit=dev

      - name: Prune platform-specific binaries
        run: node scripts/prune-platform-deps.mjs ${{ matrix.target }}

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Verify VSIX contents
        shell: bash
        run: node scripts/verify-vsix.mjs --target=${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"
          retention-days: 30

  publish:
    name: Publish to VS Code Marketplace
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || inputs.dry_run != true

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - name: Download all per-target VSIXes
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: vsix-*

      - name: List downloaded VSIXes
        shell: bash
        run: find artifacts -name '*.vsix' -print

      - name: Publish each per-target VSIX
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_PAT }}
        run: |
          # Not `set -e`: one platform's transient failure must not abort the
          # whole loop (that strands a partial, per-target-inconsistent release).
          # Each VSIX is retried on transient Marketplace errors and treated as
          # success if its version is already published (idempotent re-runs).
          set -uo pipefail
          failures=()
          for vsix in $(find artifacts -name '*.vsix' | sort); do
            echo "::group::Publishing $vsix"
            done_one=false
            for attempt in 1 2 3; do
              out="$(npx @vscode/vsce publish --packagePath "$vsix" 2>&1)" && status=0 || status=$?
              echo "$out"
              if [ "$status" -eq 0 ]; then
                done_one=true; break
              fi
              if printf '%s' "$out" | grep -qiE 'already (exists|published)|conflict|\b409\b'; then
                echo "Already published for this target; skipping."
                done_one=true; break
              fi
              echo "Attempt $attempt failed (likely transient); retrying in $((attempt * 15))s..."
              sleep $((attempt * 15))
            done
            echo "::endgroup::"
            if [ "$done_one" != true ]; then
              echo "::error::Failed to publish $vsix after 3 attempts"
              failures+=("$vsix")
            fi
          done
          if [ "${#failures[@]}" -gt 0 ]; then
            echo "::error::Publish failed for: ${failures[*]}"
            exit 1
          fi
          echo "All per-target VSIXes are published (or already present)."

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/ext-v')

    steps:
      - uses: actions/checkout@v7

      - name: Download all per-target VSIXes
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: vsix-*

      - name: Flatten VSIX layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -name '*.vsix' -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Extract changelog section for this tag
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#ext-v}"
          node scripts/extract-changelog.mjs "$version" > release-notes.md
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.notes.outputs.version }}"
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; uploading assets with --clobber"
            gh release upload "$tag" release-assets/*.vsix --clobber
          else
            gh release create "$tag" \
              --title "VS Code Extension $version" \
              --notes-file release-notes.md \
              release-assets/*.vsix
          fi
