name: Publish VS Code Extension

on:
  push:
    tags:
      - "ext-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package only; do not publish to the marketplace"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  package:
    name: Package VSIX (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-13
          - target: linux-x64
            runner: ubuntu-latest
          - target: win32-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/ext-v') && matrix.target == 'linux-x64'
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#ext-v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi

      - run: npm run build

      - name: Prune dev dependencies before packaging
        run: npm prune --omit=dev

      - name: Prune platform-specific binaries
        run: node scripts/prune-platform-deps.mjs ${{ matrix.target }}

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Verify VSIX contents
        shell: bash
        run: node scripts/verify-vsix.mjs --target=${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"
          retention-days: 30

  publish:
    name: Publish to VS Code Marketplace
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.dry_run != true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - name: Download all per-target VSIXes
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: vsix-*

      - name: List downloaded VSIXes
        shell: bash
        run: find artifacts -name '*.vsix' -print

      - name: Publish each per-target VSIX
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_PAT }}
        run: |
          set -euo pipefail
          for vsix in $(find artifacts -name '*.vsix'); do
            echo "::group::Publishing $vsix"
            npx @vscode/vsce publish --packagePath "$vsix"
            echo "::endgroup::"
          done

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/ext-v')

    steps:
      - uses: actions/checkout@v6

      - name: Download all per-target VSIXes
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: vsix-*

      - name: Flatten VSIX layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -name '*.vsix' -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Extract changelog section for this tag
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#ext-v}"
          node scripts/extract-changelog.mjs "$version" > release-notes.md
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.notes.outputs.version }}"
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; uploading assets with --clobber"
            gh release upload "$tag" release-assets/*.vsix --clobber
          else
            gh release create "$tag" \
              --title "VS Code Extension $version" \
              --notes-file release-notes.md \
              release-assets/*.vsix
          fi
