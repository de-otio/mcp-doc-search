name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npm run test:coverage

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build bundles
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  package:
    name: Package VSIX (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-13
          - target: linux-x64
            runner: ubuntu-latest
          - target: win32-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - run: npm run build

      - name: Prune dev dependencies before packaging
        run: npm prune --omit=dev

      - name: Prune platform-specific binaries
        run: node scripts/prune-platform-deps.mjs ${{ matrix.target }}

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Verify VSIX contents
        shell: bash
        run: node scripts/verify-vsix.mjs --target=${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"
          retention-days: 7

  cleanup:
    name: Cleanup old artifacts
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push'
    permissions:
      actions: write

    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner, repo, per_page: 100,
            });
            const now = Date.now();
            const maxAge = 5 * 24 * 60 * 60 * 1000;
            for (const a of artifacts.data.artifacts) {
              if (a.expired) continue;
              if (a.workflow_run.id !== context.runId) {
                const age = now - new Date(a.created_at).getTime();
                if (age > maxAge) {
                  console.log(`Deleting old artifact: ${a.name} (${a.workflow_run.id})`);
                  await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
                }
              }
            }
