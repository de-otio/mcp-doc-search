name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same PR (rapid pushes / Dependabot rebases)
# so minutes aren't burned on commits that are already obsolete. Pushes to
# main are never cancelled — every merged commit gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npm run test:coverage

      - name: Audit dependencies
        # On a high-severity finding, surface as a yellow ::warning rather
        # than a red ##[error] annotation. Dependabot security updates are
        # the actual remediation channel; CI here is informational.
        shell: bash
        run: |
          if ! npm audit --audit-level=high; then
            echo "::warning::npm audit reported high-severity vulnerabilities — review Dependabot alerts"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build bundles
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Compute the VSIX packaging matrix from the trigger. On pull requests we
  # package linux-x64 only — a cheap smoke test of the packaging path. The
  # full cross-platform set (including the native macOS/Windows runners that
  # the keychain / native-binary path needs) runs on push to main and manual
  # dispatch, and is rebuilt + published from publish-extension.yml on release
  # tags. macOS bills at 10x and Windows at 2x, so building every platform on
  # every PR was the bulk of this repo's Actions minutes.
  package-matrix:
    name: Compute package matrix
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    steps:
      - id: set
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'matrix={"include":[{"target":"linux-x64","runner":"ubuntu-latest"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"target":"darwin-arm64","runner":"macos-latest"},{"target":"darwin-x64","runner":"macos-15-intel"},{"target":"linux-x64","runner":"ubuntu-latest"},{"target":"win32-x64","runner":"windows-latest"}]}' >> "$GITHUB_OUTPUT"
          fi

  package:
    name: Package VSIX (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: package-matrix
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.package-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - run: npm run build

      - name: Prune dev dependencies before packaging
        run: npm prune --omit=dev

      - name: Prune platform-specific binaries
        run: node scripts/prune-platform-deps.mjs ${{ matrix.target }}

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Verify VSIX contents
        shell: bash
        run: node scripts/verify-vsix.mjs --target=${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"
          retention-days: 7

  cleanup:
    name: Cleanup old artifacts
    runs-on: ubuntu-latest
    needs: package
    timeout-minutes: 5
    if: github.event_name == 'push'
    permissions:
      actions: write

    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner, repo, per_page: 100,
            });
            const now = Date.now();
            const maxAge = 5 * 24 * 60 * 60 * 1000;
            for (const a of artifacts.data.artifacts) {
              if (a.expired) continue;
              if (a.workflow_run.id !== context.runId) {
                const age = now - new Date(a.created_at).getTime();
                if (age > maxAge) {
                  console.log(`Deleting old artifact: ${a.name} (${a.workflow_run.id})`);
                  await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
                }
              }
            }
