name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: linux-x64
            runner: ubuntu-latest
          - target: win32-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - run: npm run build

      - name: Prune dev dependencies before packaging
        run: npm prune --omit=dev

      - name: Prune platform-specific binaries for other platforms
        run: node scripts/prune-platform-deps.mjs ${{ matrix.target }}

      - name: Package VSIX for ${{ matrix.target }}
        run: npx vsce package --target ${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"
          retention-days: 5
