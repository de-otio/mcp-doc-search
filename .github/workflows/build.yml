name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: linux-x64
            runner: ubuntu-latest
          - target: win32-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - run: npm run build

      - name: Prune dev dependencies before packaging
        run: npm prune --omit=dev

      - name: Prune platform-specific binaries for other platforms
        run: node scripts/prune-platform-deps.mjs ${{ matrix.target }}

      - name: Show node_modules size breakdown
        shell: bash
        run: du -sh node_modules/*/ | sort -rh | head -20

      - name: Package VSIX for ${{ matrix.target }}
        run: npx vsce package --target ${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"
          retention-days: 5

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      actions: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner, repo, per_page: 100,
            });
            const now = Date.now();
            const maxAge = 5 * 24 * 60 * 60 * 1000; // 5 days
            for (const a of artifacts.data.artifacts) {
              if (a.expired) continue;
              // Delete artifacts from older runs (not the current one)
              if (a.workflow_run.id !== context.runId) {
                const age = now - new Date(a.created_at).getTime();
                if (age > maxAge) {
                  console.log(`Deleting old artifact: ${a.name} (${a.workflow_run.id})`);
                  await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
                }
              }
            }
